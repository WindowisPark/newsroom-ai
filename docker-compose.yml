services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: newsroom
    volumes:
      - pgdata:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD", "pg_isready", "-U", "postgres", "-d", "newsroom"]
      interval: 3s
      timeout: 3s
      retries: 20

  backend:
    build:
      context: .
      dockerfile: backend/Dockerfile
    environment:
      # docker compose 내부 postgres 서비스로 고정. 외부(Supabase 등) 를 쓰고
      # 싶다면 docker-compose.override.yml 로 DATABASE_URL 덮어쓰거나
      # 네이티브 uvicorn 으로 실행하세요 — 호스트의 .env 값을 자동 주입하지 않는 이유는
      # 재현성 때문입니다.
      DATABASE_URL: postgresql+asyncpg://postgres:postgres@postgres:5432/newsroom
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY:-}
      NEWSAPI_KEY: ${NEWSAPI_KEY:-}
      NAVER_CLIENT_ID: ${NAVER_CLIENT_ID:-}
      NAVER_CLIENT_SECRET: ${NAVER_CLIENT_SECRET:-}
      COLLECT_INTERVAL_MINUTES: ${COLLECT_INTERVAL_MINUTES:-15}
      CORS_ORIGINS: "http://localhost:3000"
    ports:
      - "8000:8000"
    depends_on:
      postgres:
        condition: service_healthy

  frontend:
    build:
      context: .
      dockerfile: frontend/Dockerfile
      args:
        NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL:-http://localhost:8000/api/v1}
    ports:
      - "3000:3000"
    depends_on:
      - backend

volumes:
  pgdata:
