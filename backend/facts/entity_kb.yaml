# 공직자·정치인 Entity Knowledge Base
#
# fact_check 모듈이 LLM 생성문에서 "{name} {role}" 패턴을 감지해
# role 이 current_role 과 불일치하면 role_mismatch Issue 로 flag.
#
# 구조:
#   - name: 인물명 (한글, 공백 없음 또는 실제 표기 그대로)
#     current_role: 현재 공식 직책 (예: "대통령", "국회의원", "장관")
#     affiliation: 소속 (정당·부처 등, 선택)
#     aliases: 별칭·전직 (선택)
#     source_note: KB 기록 근거 (선택)
#
# 갱신은 수동. 인물이 새로 등장하면 추가.
# 기준 시점: 2026-04 (제출 시점 기준 수작업 업데이트 필요)

entities:
